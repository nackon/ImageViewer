<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ImageViewer</title>
    <script>
        // Set the theme before first paint to avoid a flash of the wrong theme.
        // Kept in sync with src/theme.js (resolveTheme / normalizeThemePreference).
        (function () {
            var preference = localStorage.getItem('themePreference');
            var systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            var theme = (preference === 'light' || preference === 'dark')
                ? preference
                : (systemPrefersDark ? 'dark' : 'light');
            document.documentElement.dataset.theme = theme;
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Dark theme (default) */
        :root {
            --bg: #2b2b2b;
            --fg: #cccccc;
            --bar-bg: #1a1a1a;
            --border: #3a3a3a;
            --muted: #888888;
            --drop-fg: #666666;
            --drop-active-bg: rgba(255, 255, 255, 0.1);
            --thumb-bg: #3a3a3a;
            --thumb-hover-border: #666666;
            --accent: #4a9eff;
        }

        /* Light theme */
        :root[data-theme="light"] {
            --bg: #f5f5f5;
            --fg: #333333;
            --bar-bg: #e9e9e9;
            --border: #d4d4d4;
            --muted: #777777;
            --drop-fg: #999999;
            --drop-active-bg: rgba(0, 0, 0, 0.06);
            --thumb-bg: #e0e0e0;
            --thumb-hover-border: #aaaaaa;
            --accent: #1a73e8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--fg);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #header {
            background: var(--bar-bg);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        #filename {
            font-size: 14px;
            color: var(--fg);
        }

        #info {
            font-size: 12px;
            color: var(--muted);
        }

        #main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #image-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: auto;
            background: var(--bg);
        }

        #drop-zone {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--drop-fg);
            flex-direction: column;
            gap: 20px;
        }

        #drop-zone.active {
            background: var(--drop-active-bg);
            border: 2px dashed var(--drop-fg);
        }

        #image-wrapper {
            display: none;
            position: relative;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
        }

        #image-wrapper.loaded {
            display: flex;
        }

        #image {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.1s ease;
        }

        #thumbnail-view {
            display: none;
            flex-direction: column;
            height: 100%;
            background: var(--bg);
        }

        #thumbnail-view.active {
            display: flex;
        }

        #thumbnail-grid {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            align-content: start;
        }

        .thumbnail-item {
            width: 150px;
            height: 150px;
            background: var(--thumb-bg);
            border: 3px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .thumbnail-item:hover {
            border-color: var(--thumb-hover-border);
        }

        .thumbnail-item.selected {
            border-color: var(--accent);
        }

        .thumbnail-item img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #footer {
            background: var(--bar-bg);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            font-size: 12px;
        }

        #footer.thumbnail-mode {
            justify-content: center;
        }

        .hidden {
            display: none;
        }

        #shortcuts-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #shortcuts-panel {
            background: var(--bar-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px 24px;
            max-width: 480px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        #shortcuts-panel h2 {
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #shortcuts-close {
            cursor: pointer;
            color: var(--muted);
            font-size: 14px;
            background: none;
            border: none;
            padding: 0;
        }

        #shortcuts-close:hover {
            color: var(--fg);
        }

        #shortcuts-list {
            display: grid;
            grid-template-columns: auto 1fr;
            column-gap: 16px;
            row-gap: 8px;
            font-size: 13px;
        }

        #shortcuts-list dt {
            color: var(--accent);
            font-weight: 600;
            white-space: nowrap;
        }

        #shortcuts-list dd {
            color: var(--fg);
        }
    </style>
</head>
<body>
    <div id="header">
        <div id="filename">No image loaded</div>
        <div id="info"></div>
    </div>

    <div id="main-view">
        <!-- Image View -->
        <div id="image-container">
            <div id="drop-zone">
                <div>Drop an image here or click to open</div>
                <div style="font-size: 14px; color: var(--muted);">Keyboard: ← → Space N P | T: Thumbnails | D: Theme | ?: Help | Q: Quit</div>
            </div>
            <div id="image-wrapper">
                <img id="image" />
            </div>
        </div>

        <!-- Thumbnail View -->
        <div id="thumbnail-view">
            <div id="thumbnail-grid"></div>
        </div>
    </div>

    <div id="footer">
        <span id="image-position" class="hidden">1/1</span>
        <span id="zoom-level" class="hidden">Zoom: 100%</span>
        <span id="thumbnail-hint" class="hidden">[T] Thumbnails</span>
        <span id="thumbnail-footer" class="hidden">Use ↑↓←→ to navigate, Enter to view</span>
    </div>

    <div id="shortcuts-overlay" class="hidden">
        <div id="shortcuts-panel">
            <h2>
                Keyboard Shortcuts
                <button id="shortcuts-close" data-shortcuts-close>Close (Esc)</button>
            </h2>
            <dl id="shortcuts-list"></dl>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
