<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ImageViewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #header {
            background: #2a2a2a;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3a3a3a;
        }

        #filename {
            font-size: 14px;
            color: #cccccc;
        }

        #info {
            font-size: 12px;
            color: #888888;
        }

        #image-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #drop-zone {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #666666;
        }

        #drop-zone.active {
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed #666666;
        }

        #image {
            display: none;
            transition: transform 0.2s ease-out;
        }

        #image.loaded {
            display: block;
        }

        #footer {
            background: #2a2a2a;
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid #3a3a3a;
        }

        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #0052a3;
        }

        button:active {
            background: #003d7a;
        }

        .help {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 12px;
            color: #cccccc;
        }
    </style>
</head>
<body>
    <div id="header">
        <div id="filename">No image loaded</div>
        <div id="info"></div>
    </div>

    <div id="image-container">
        <div id="drop-zone">
            Drop an image here or press Open
        </div>
        <img id="image" />
        <div class="help">
            Keyboard: ← Previous | → Next | Space Open | +/- Zoom | 0 Fit
        </div>
    </div>

    <div id="footer">
        <button id="open-btn">Open</button>
        <button id="prev-btn">← Previous</button>
        <button id="next-btn">Next →</button>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
