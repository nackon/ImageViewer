<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ImageViewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #2b2b2b;
            color: #cccccc;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #header {
            background: #1a1a1a;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3a3a3a;
        }

        #filename {
            font-size: 14px;
            color: #cccccc;
        }

        #info {
            font-size: 12px;
            color: #888888;
        }

        #main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #image-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: auto;
            background: #2b2b2b;
        }

        #drop-zone {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #666666;
            flex-direction: column;
            gap: 20px;
        }

        #drop-zone.active {
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed #666666;
        }

        #image-wrapper {
            display: none;
            position: relative;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
        }

        #image-wrapper.loaded {
            display: flex;
        }

        #image {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.1s ease;
        }

        #thumbnail-view {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #2b2b2b;
        }

        #thumbnail-view.active {
            display: flex;
        }

        #thumbnail-grid {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            align-content: start;
        }

        .thumbnail-item {
            width: 150px;
            height: 150px;
            background: #3a3a3a;
            border: 3px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .thumbnail-item:hover {
            border-color: #666666;
        }

        .thumbnail-item.selected {
            border-color: #4a9eff;
        }

        .thumbnail-item img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #footer {
            background: #1a1a1a;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #3a3a3a;
            font-size: 12px;
        }

        #footer.thumbnail-mode {
            justify-content: center;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="header">
        <div id="filename">No image loaded</div>
        <div id="info"></div>
    </div>

    <div id="main-view">
        <!-- Image View -->
        <div id="image-container">
            <div id="drop-zone">
                <div>Drop an image here or click to open</div>
                <div style="font-size: 14px; color: #888;">Keyboard: ← → Space N P | T: Thumbnails | Q: Quit</div>
            </div>
            <div id="image-wrapper">
                <img id="image" />
            </div>
        </div>

        <!-- Thumbnail View -->
        <div id="thumbnail-view">
            <div id="thumbnail-grid"></div>
        </div>
    </div>

    <div id="footer">
        <span id="image-position" class="hidden">1/1</span>
        <span id="zoom-level" class="hidden">Zoom: 100%</span>
        <span id="thumbnail-hint" class="hidden">[T] Thumbnails</span>
        <span id="thumbnail-footer" class="hidden">Use ↑↓←→ to navigate, Enter to view</span>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
